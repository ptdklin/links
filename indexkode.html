<!DOCTYPE html>
<html>
<head>
    <title>Вход на сайт</title>
    <meta charset="utf-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        input {
            padding: 10px;
            margin: 10px 0;
            width: 200px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Введите пароль</h2>
        <input type="password" id="password" placeholder="Пароль">
        <br>
        <button onclick="checkPassword()">Войти</button>
    </div>

    <script>
        // Пароль для входа
        const SECRET_PASSWORD = "12345";

        // Функция проверки пароля
        function checkPassword() {
            const enteredPassword = document.getElementById('password').value;
            
            if (enteredPassword === SECRET_PASSWORD) {
                // Если пароль верный - сохраняем доступ и переходим на контент
                localStorage.setItem('site_access', 'true');
                window.location.href = 'content.html';
            } else {
                alert('Неверный пароль!');
            }
        }

        // Проверяем при загрузке - может уже есть доступ
        window.onload = function() {
            if (localStorage.getItem('site_access') === 'true') {
                window.location.href = 'content.html';
            }
        }

        // Добавляем поддержку клавиши Enter
        document.addEventListener('DOMContentLoaded', function() {
            const passwordInput = document.getElementById('password');
            passwordInput.addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    checkPassword();
                }
            });
        });
    </script>
</body>
</html>
