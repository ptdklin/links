<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Переход...</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta http-equiv="refresh" content="0; url=https://tbhelper.ru">
    <style>
        body {
            background: #f0f2f5;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .message {
            text-align: center;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="message">
        <div class="loader"></div>
        <p>Перенаправление на сайт...</p>
        <p><small>Если ничего не происходит, <a href="https://tbhelper.ru/content.html">нажмите сюда</a></small></p>
    </div>
</body>
</html>
