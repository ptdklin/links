<!DOCTYPE html>
<html>
<head>
    <title>Вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-image: url('romashki.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 360px;
            position: relative;
            z-index: 2;
            backdrop-filter: blur(5px);
        }
        
        h2 {
            color: #333;
            margin-bottom: 24px;
            font-weight: 500;
            font-size: 24px;
            text-align: center;
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.9);
        }
        
        input:focus {
            border-color: #4a90e2;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        button:hover {
            background: #357abd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Введите пароль</h2>
        
        <form onsubmit="checkPassword(); return false;">
            <input type="password" id="pass" placeholder="Пароль" autofocus>
            <button type="submit">Войти</button>
        </form>
    </div>

    <script>
        function checkPassword() {
            if (document.getElementById('pass').value === '12345') {
                window.location.href = 'content.html';
            } else {
                alert('Неверный пароль');
            }
        }
    </script>
</body>
</html>
